<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Posture AI - Bare Stream</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .video-container { position: relative; border: 4px solid #333; border-radius: 8px; overflow: hidden; }
        img { display: block; max-width: 100%; max-height: 80vh; }
        .controls { margin-top: 20px; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="video-container">
        <img src="/video_feed" alt="Live Feed">
    </div>
    <div class="controls">
        <button onclick="calibrate()">CALIBRATE BASELINE</button>
    </div>
    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        function calibrate() {
            ws.send(JSON.stringify({command: 'calibrate'}));
        }
    </script>
</body>
</html>
